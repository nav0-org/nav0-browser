<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:;">
  <title>Nav0 Browser</title>

</head>
<body>
  <div id="browser-layout-container" class="browser-layout-container">
    <div id="browser-control-panel" class="controls">
      <!-- Tab Bar -->
      <div class="tab-bar">
        <div class="private-window-identifier" title="This is a private window."  id="private-window-identifier">
          <i data-lucide="shield-check" width="18" height="18" style="margin-right: 6px;"></i>
          <span>Private!</span>
        </div>
        <button class="btn-icon btn-ghost rounded-circle p-0 tab-scroll-btn" id="tab-scroll-left" title="Scroll tabs left" style="width: 28px; height: 28px;">
          <i data-lucide="chevron-left" width="16" height="16"></i>
        </button>
        <div class="tabs-container" id="tabs-container">
          <!-- Tabs will be dynamically inserted here -->
        </div>
        <button class="btn-icon btn-ghost rounded-circle p-0 tab-scroll-btn" id="tab-scroll-right" title="Scroll tabs right" style="width: 28px; height: 28px;">
          <i data-lucide="chevron-right" width="16" height="16"></i>
        </button>
        
        <div id="controls-wrapper">
          <button class="btn-icon btn-ghost rounded-circle p-0" id="new-tab-button" style="width: 28px; height: 28px;">
            <i data-lucide="plus" width="16" height="16"></i>
          </button>
        </div>
      </div>
    </div>
    <!-- Navigation Bar -->
    <div class="nav-bar">
      <div class="nav-controls">
        <button id="back-button" title="Go back" disabled="true" class="btn-icon btn-ghost rounded-circle p-0" style="width: 32px; height: 32px;">
          <i data-lucide="arrow-left" width="18" height="18"></i>
        </button>
        <button id="forward-button" title="Go forward" disabled="true" class="btn-icon btn-ghost rounded-circle p-0" style="width: 32px; height: 32px;">
          <i data-lucide="arrow-right" width="18" height="18"></i>
        </button>
        <button id="refresh-button" title="Refresh" class="btn-icon btn-ghost rounded-circle p-0" style="width: 32px; height: 32px;">
          <i data-lucide="refresh-cw" width="18" height="18"></i>
        </button>
        <button id="command-k-button" title="Super search with Command K" class="btn-icon btn-ghost rounded-circle p-0" style="width: 32px; height: 32px;">
          <i data-lucide="terminal" width="18" height="18"></i>
        </button>
      </div>
      
      <div class="address-bar">
          <button class="btn-icon btn-ghost rounded-circle p-0 ssl-indicator ssl-search" id="ssl-indicator" style="width: 32px; height: 32px;" title="Search">
            <svg class="ssl-icon" id="ssl-icon-search" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          </button>
        <input type="text" class="url-input" id="url-input">
        <button id="reader-mode-button" title="Reader Mode" class="btn-icon btn-ghost rounded-circle p-0 reader-mode-btn" style="width: 32px; height: 32px; display: none;">
          <i data-lucide="book-open-text" width="16" height="16"></i>
        </button>
        <button id="pdf-download-button" title="Download PDF" class="btn-icon btn-ghost rounded-circle p-0" style="width: 32px; height: 32px; display: none;">
          <i data-lucide="file-down" width="16" height="16"></i>
        </button>
        <button id="bookmark-button" title="Bookmark this page" class="btn-icon btn-ghost rounded-circle p-0" style="width: 32px; height: 32px;">
          <i data-lucide="bookmark" width="16" height="16"></i>
        </button>
        <button id="unbookmark-button" title="Add to reading list" class="btn-icon btn-ghost rounded-circle p-0" style="width: 32px; height: 32px;">
          <i data-lucide="bookmark-check" width="16" height="16"></i>
        </button>
        <button id="readinglist-button" title="Remove from reading list" class="btn-icon btn-ghost rounded-circle p-0" style="width: 32px; height: 32px;">
          <i data-lucide="book-open-check" width="16" height="16"></i>
        </button>
      </div>
      
      <button class="btn-icon btn-ghost rounded-circle p-0 position-relative" title="Downloads" id="downloads-button" style="width: 32px; height: 32px; margin-left: var(--spacing-xs);">
        <i data-lucide="download" width="18" height="18"></i>
        <svg id="download-progress-ring" class="download-progress-ring" width="32" height="32" viewBox="0 0 32 32" style="display: none;">
          <circle class="download-progress-ring-bg" cx="16" cy="16" r="14" fill="none" stroke-width="2"></circle>
          <circle class="download-progress-ring-fill" cx="16" cy="16" r="14" fill="none" stroke-width="2"></circle>
        </svg>
      </button>

      <!-- Extension toolbar buttons -->
      <div id="extension-buttons" class="extension-buttons-container"></div>

      <button class="btn-icon btn-ghost rounded-circle p-0 position-relative" title="Menu options"  id="options-button" style="width: 32px; height: 32px; margin-left: var(--spacing-xs);">
        <i data-lucide="ellipsis-vertical" width="18" height="18"></i>
      </button>
      <div id="options-container"></div>
    </div>
    <!-- Permission Strip (hidden by default) -->
    <div id="permission-strip" class="permission-strip" style="display: none;">
      <div class="permission-strip-content">
        <div class="permission-strip-info">
          <i id="perm-lock-icon" data-lucide="lock" width="14" height="14" class="perm-icon-secure"></i>
          <i id="perm-warning-icon" data-lucide="triangle-alert" width="14" height="14" class="perm-icon-insecure" style="display:none;"></i>
          <span class="perm-origin" id="perm-origin"></span>
          <span class="perm-separator">wants to access</span>
          <span class="perm-label" id="perm-label"></span>
        </div>
        <div class="permission-strip-actions">
          <button id="perm-allow-once" class="perm-btn perm-btn-allow">Allow Once</button>
          <button id="perm-always-allow" class="perm-btn perm-btn-always-allow">Always Allow</button>
          <button id="perm-deny-once" class="perm-btn perm-btn-deny">Deny Once</button>
          <button id="perm-always-deny" class="perm-btn perm-btn-always-deny">Always Deny</button>
        </div>
        <div class="permission-strip-notes">
          <span id="perm-private-note" class="perm-note" style="display:none;">Private mode — not saved</span>
          <span id="perm-insecure-note" class="perm-note perm-note-danger" style="display:none;">Insecure site — allow blocked</span>
        </div>
      </div>
    </div>
    <!-- Find in Page Bar (hidden by default) -->
    <div id="find-in-page-bar" class="find-in-page-bar" style="display: none;">
      <div class="find-bar-wrapper">
        <div class="find-bar" id="find-bar" role="search" aria-label="Find in page">
          <div class="find-input-group">
            <i data-lucide="search" class="search-icon" width="14" height="14"></i>
            <input
              type="text"
              id="find-input"
              class="find-input"
              placeholder="Find in page"
              autocomplete="off"
              spellcheck="false"
              aria-label="Search text"
            >
            <span class="match-counter" id="match-counter" aria-live="polite"></span>
          </div>
          <div class="find-actions">
            <button class="find-toggle-btn" id="match-case-btn" title="Match Case (Alt+C)" aria-label="Match Case" aria-pressed="false">
              Aa
            </button>
            <button class="find-toggle-btn" id="whole-word-btn" title="Whole Word (Alt+W)" aria-label="Whole Word" aria-pressed="false">
              <span class="whole-word-icon">ab</span>
            </button>
            <button class="find-toggle-btn" id="regex-btn" title="Regular Expression (Alt+R)" aria-label="Regular Expression" aria-pressed="false">
              .*
            </button>
            <div class="find-separator"></div>
            <button class="find-nav-btn" id="prev-btn" title="Previous Match (Shift+Enter)" aria-label="Previous match">
              <i data-lucide="chevron-up" width="16" height="16"></i>
            </button>
            <button class="find-nav-btn" id="next-btn" title="Next Match (Enter)" aria-label="Next match">
              <i data-lucide="chevron-down" width="16" height="16"></i>
            </button>
            <div class="find-separator"></div>
            <button class="find-nav-btn find-close-btn" id="close-btn" title="Close (Escape)" aria-label="Close find bar">
              <i data-lucide="x" width="16" height="16"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
    <div id="browser-view-container">
      <!-- This is where the BrowserView will be displayed -->
    </div>
  </div>
  
</body>
</html>
