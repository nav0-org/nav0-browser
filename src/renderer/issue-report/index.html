<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://nav0-issue-creation.100-percent-ketan.workers.dev;">
</head>
<body>
  <div class="issue-report-overlay" id="issue-report-overlay">
    <div class="issue-report-scrim" id="issue-report-scrim"></div>
    <div class="issue-report-dialog" id="issue-report-dialog" role="dialog" aria-modal="true" aria-labelledby="issue-report-title">

      <div class="issue-report-header">
        <i data-lucide="bug" width="16" height="16"></i>
        <span id="issue-report-title">Report an Issue</span>
      </div>

      <div class="issue-report-body">
        <div class="form-group">
          <label class="form-label" for="issue-title">Title</label>
          <input type="text" class="form-control" id="issue-title" placeholder="Brief summary of the issue" maxlength="200" />
        </div>

        <div class="form-group">
          <label class="form-label" for="issue-type">Type</label>
          <select class="form-control" id="issue-type">
            <option value="bug">Bug Report</option>
            <option value="feature">Feature Request</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="issue-description">Description</label>
          <textarea class="form-control" id="issue-description" rows="5" placeholder="Describe the issue or suggestion in detail..."></textarea>
        </div>

        <div class="issue-report-sysinfo">
          <label class="form-label">System Info (auto-attached)</label>
          <div class="sysinfo-preview" id="sysinfo-preview"></div>
        </div>
      </div>

      <div class="issue-report-status" id="issue-report-status" style="display:none;"></div>

      <div class="issue-report-actions">
        <button id="issue-cancel-btn" class="btn btn-secondary">Cancel</button>
        <button id="issue-submit-btn" class="btn btn-primary">Submit</button>
      </div>

    </div>
  </div>
</body>
</html>
