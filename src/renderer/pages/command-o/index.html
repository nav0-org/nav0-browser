<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:;">
</head>
<body>
  <div class="overlay-container">
    <!-- Search bar -->
    <div class="search-bar">
      <span class="shortcut-badge">&#8984;O</span>
      <i data-lucide="search" class="search-icon" width="16" height="16"></i>
      <input type="text" id="search-input" class="search-input" placeholder="Search across all tabs..." autofocus>
      <span class="tab-count" id="tab-count">0 tabs</span>
    </div>

    <!-- Tabs grid -->
    <div class="tabs-body" id="tabs-body">
      <!-- Dynamic window groups and tab cards rendered here -->
    </div>

    <!-- Footer -->
    <div class="footer-bar">
      <div class="footer-keys">
        <span class="key">&larr;</span>
        <span class="key">&rarr;</span>
        <span class="key-label">move</span>
        <span class="key">&uarr;</span>
        <span class="key">&darr;</span>
        <span class="key-label">rows</span>
        <span class="key">&#9166;</span>
        <span class="key-label">switch</span>
        <span class="key">esc</span>
        <span class="key-label">close</span>
      </div>
      <div class="footer-right" id="footer-drag-hint" style="display:none;">drag tabs between windows</div>
      <div class="footer-right" id="footer-private" style="display:none;">private mode</div>
    </div>
  </div>
</body>
</html>
