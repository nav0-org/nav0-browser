<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:;">
  <title>Downloads</title>
</head>
<body>

<div id="downloads-page" class="downloads-page">
  <div class="downloads-wrapper">

    <!-- Header -->
    <h1 class="downloads-title">Downloads</h1>
    <p class="downloads-subtitle">View and manage your downloaded files</p>

    <!-- Search -->
    <div class="search-container">
      <input type="text" id="search-input" class="search-input" placeholder="Search downloads...">
      <i data-lucide="search" class="search-icon" width="16" height="16"></i>
    </div>

    <!-- Type filter pills -->
    <div id="type-filters" class="type-filters">
      <!-- Populated dynamically -->
    </div>

    <!-- Storage gauge -->
    <!-- NOTE: Storage breakdown is computed from loaded download records only.
         There is no backend API for total disk usage or per-type storage stats. -->
    <div id="storage-gauge" class="storage-gauge">
      <div class="storage-header">
        <span class="storage-label">Storage</span>
        <span id="storage-total" class="storage-total"></span>
      </div>
      <div id="storage-bar" class="storage-bar"></div>
      <div id="storage-legend" class="storage-legend"></div>
    </div>

    <!-- Downloads list -->
    <div class="downloads-container">
      <div id="downloads-list" class="downloads-list">
        <!-- Download items will be dynamically inserted here -->
      </div>
      <div id="no-downloads" class="no-downloads">
        No downloads match your search.
      </div>
    </div>

    <!-- Clear All -->
    <div class="downloads-footer">
      <button id="delete-all" class="btn-clear-all">Clear All</button>
    </div>

  </div>
</div>

</body>
</html>
