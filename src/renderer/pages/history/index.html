<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:;"
    />
    <title>Browsing History</title>
  </head>
  <body>
    <div class="history-page">
      <div class="history-container">
        <!-- Header -->
        <div class="history-head">
          <h1 class="history-title">History</h1>
          <p class="history-stats-label" id="history-stats"></p>
        </div>

        <!-- Toolbar: search + time-range + clear -->
        <div class="history-toolbar">
          <div class="search-container">
            <i data-lucide="search" class="search-icon" width="16" height="16"></i>
            <input
              type="text"
              id="search-input"
              class="search-input"
              placeholder="Search history…"
            />
          </div>
          <div class="time-range-group" role="tablist">
            <button class="time-range-btn active" data-range="all">All</button>
            <button class="time-range-btn" data-range="week">Week</button>
            <button class="time-range-btn" data-range="today">Today</button>
          </div>
          <button id="delete-all" class="btn-clear-all" style="display: none">
            <i data-lucide="trash-2" width="14" height="14"></i> Clear
          </button>
        </div>

        <!-- Heatmap -->
        <div class="panel panel-heat" id="heatmap-container"></div>

        <!-- Analytics Row -->
        <div class="analytics-grid">
          <div class="panel analytics-card">
            <div class="panel-head">
              <div class="panel-title" id="domain-chart-label">Top sites</div>
            </div>
            <div class="stat-list" id="domain-chart-container"></div>
          </div>
          <div class="panel analytics-card">
            <div class="panel-head">
              <div class="panel-title" id="category-label">By category</div>
            </div>
            <div class="stat-list" id="category-container"></div>
          </div>
        </div>

        <!-- Session-grouped history -->
        <div id="history-list" class="history-list"></div>

        <!-- Empty state -->
        <div id="no-history" class="no-history" style="display: none">
          <i data-lucide="clock" width="32" height="32"></i>
          <p>No browsing history found</p>
        </div>

        <!-- Loading -->
        <div id="loading-indicator" class="loading-indicator" style="display: none">Loading…</div>

        <!-- Footer placeholder (Clear All moved into toolbar) -->
        <div class="history-footer" id="history-footer"></div>

        <!-- Infinite scroll sentinel -->
        <div id="scroll-sentinel" style="height: 1px"></div>
      </div>
    </div>
  </body>
</html>
