<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: #0f0f0f;
        color: #e0e0e0;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding: 60px 20px;
        -webkit-font-smoothing: antialiased;
      }

      .warning-container {
        max-width: 600px;
        width: 100%;
      }

      .warning-icon {
        width: 64px;
        height: 64px;
        margin-bottom: 24px;
      }

      .warning-icon svg {
        width: 64px;
        height: 64px;
      }

      h1 {
        font-size: 24px;
        font-weight: 700;
        color: #f44336;
        margin-bottom: 16px;
        line-height: 1.3;
      }

      .description {
        font-size: 15px;
        line-height: 1.7;
        color: #b0b0b0;
        margin-bottom: 32px;
      }

      .description strong {
        color: #e0e0e0;
      }

      .description code {
        background: #1a1a1a;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 13px;
        color: #ff8a80;
      }

      .back-button {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 28px;
        background-color: #2196f3;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
        margin-bottom: 40px;
      }

      .back-button:hover {
        background-color: #1976d2;
      }

      .divider {
        border: none;
        border-top: 1px solid #222;
        margin: 0 0 24px 0;
      }

      .advanced-toggle {
        font-size: 13px;
        color: #777;
        cursor: pointer;
        user-select: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 16px;
      }

      .advanced-toggle:hover {
        color: #999;
      }

      .arrow {
        display: inline-block;
        transition: transform 0.2s;
        font-size: 10px;
      }

      .arrow.open {
        transform: rotate(90deg);
      }

      .advanced-content {
        display: none;
        animation: fadeIn 0.2s ease-in;
      }

      .advanced-content.visible {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .risk-card {
        background-color: #1a1212;
        border: 1px solid #3d1f1f;
        border-radius: 10px;
        padding: 20px 24px;
        margin-bottom: 20px;
      }

      .risk-card h3 {
        font-size: 14px;
        font-weight: 600;
        color: #ff8a80;
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .risk-card ul {
        list-style: none;
        padding: 0;
      }

      .risk-card li {
        font-size: 14px;
        line-height: 1.6;
        color: #b0a0a0;
        padding: 4px 0 4px 20px;
        position: relative;
      }

      .risk-card li::before {
        content: '\2022';
        color: #f44336;
        position: absolute;
        left: 4px;
      }

      .proceed-button {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        background: transparent;
        color: #777;
        border: 1px solid #333;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .proceed-button:hover {
        color: #ff8a80;
        border-color: #5c2a2a;
        background-color: #1a1212;
      }

      .url-display {
        font-size: 12px;
        color: #555;
        margin-top: 16px;
        word-break: break-all;
        font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
      }
    </style>
  </head>
  <body>
    <div class="warning-container">
      <div class="warning-icon">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#f44336"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          {{ICON_SVG}}
        </svg>
      </div>

      <h1>{{HEADING}}</h1>
      <p class="description">{{DESCRIPTION}}</p>

      <button class="back-button" id="goBackBtn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="15 18 9 12 15 6" />
        </svg>
        Go back to safety
      </button>

      <hr class="divider" />

      <div class="advanced-toggle" onclick="toggleAdvanced()">
        <span class="arrow" id="arrow">&#9654;</span>
        Advanced
      </div>

      <div class="advanced-content" id="advancedContent">
        <div class="risk-card">
          <h3>Risks of proceeding</h3>
          <ul>
            {{RISK_DETAILS}}
          </ul>
        </div>

        <button class="proceed-button" id="proceedBtn" data-url="{{ENCODED_URL}}">
          Proceed to {{HOSTNAME}} (unsafe)
        </button>

        <div class="url-display">{{URL_DISPLAY}}</div>
      </div>
    </div>

    <script>
      function toggleAdvanced() {
        var content = document.getElementById('advancedContent');
        var arrow = document.getElementById('arrow');
        content.classList.toggle('visible');
        arrow.classList.toggle('open');
      }

      document.getElementById('goBackBtn').addEventListener('click', function () {
        document.title = '__ssl_go_back__';
      });

      document.getElementById('proceedBtn').addEventListener('click', function () {
        var encoded = this.getAttribute('data-url');
        var url = atob(encoded);
        window.location.href = url;
      });
    </script>
  </body>
</html>
