name: Idle Memory Measurement

# Measures Nav0's idle memory footprint on a real Ubuntu runner (which, unlike a
# scoped sandbox, can download the Electron runtime binary). Packages the app,
# launches it headless under xvfb with a throwaway profile, lets it settle, then
# samples summed PSS (accurate) + RSS (naive) + per-process-type breakdown.
# Trigger manually from the Actions tab.

on:
  workflow_dispatch:
    inputs:
      runs:
        description: 'Number of measurement runs (median reported)'
        required: false
        default: '3'
      settle_ms:
        description: 'Idle settle time before sampling (ms)'
        required: false
        default: '30000'
      window_ms:
        description: 'Sampling window (ms)'
        required: false
        default: '30000'

jobs:
  idle-memory:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # xvfb to give the headless app a virtual display, plus Electron's runtime
      # GUI libs (the -dev packages pull in their runtime counterparts).
      - name: Install runtime + xvfb dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3-dev libatk-bridge2.0-dev libdrm2 libgtk-3-dev libgbm-dev
          sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2 || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm install

      - name: Package app
        run: npm run package

      - name: Run idle-memory measurement
        env:
          RUNS: ${{ github.event.inputs.runs }}
          SETTLE_MS: ${{ github.event.inputs.settle_ms }}
          SAMPLE_WINDOW_MS: ${{ github.event.inputs.window_ms }}
        run: |
          mkdir -p tests/performance/reports
          node tests/performance/idle-memory-test.js | tee tests/performance/reports/idle-memory.txt

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: idle-memory-report
          path: tests/performance/reports/idle-memory.txt
